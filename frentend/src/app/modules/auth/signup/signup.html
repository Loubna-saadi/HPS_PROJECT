<div class="auth-wrapper d-flex align-items-center justify-content-center">
  <div class="card shadow border-0 auth-card">
    <div class="card-body p-5">
      <div class="text-center mb-4">
        <h3 class="fw-bold text-primary">Créer un compte</h3>
        <p class="text-muted small">Remplissez le formulaire pour vous inscrire</p>
      </div>

      <form (ngSubmit)="onSubmit()">
        <div class="mb-3">
          <label class="form-label small fw-bold">Nom complet <span class="text-muted fw-normal">(optionnel)</span></label>
          <input type="text" name="nom" [(ngModel)]="signupData.nom"
                 class="form-control" placeholder="Ex: Jean Dupont">
        </div>

        <div class="mb-3">
          <label class="form-label small fw-bold">Login <span class="text-danger">*</span></label>
          <input type="text" name="login" [(ngModel)]="signupData.login"
                 class="form-control" required placeholder="Choisissez un identifiant">
        </div>

        <div class="mb-3">
          <label class="form-label small fw-bold">Mot de passe <span class="text-danger">*</span></label>
          <input type="password" name="password" [(ngModel)]="signupData.password"
                 class="form-control" required placeholder="Minimum 4 caractères">
        </div>

        <div class="mb-4">
          <label class="form-label small fw-bold">Confirmer le mot de passe <span class="text-danger">*</span></label>
          <input type="password" name="confirmPassword" [(ngModel)]="signupData.confirmPassword"
                 class="form-control" required placeholder="Répétez le mot de passe">
        </div>

        @if (errorMessage) {
          <div class="alert alert-danger py-2 small border-0">
            <i class="bi bi-exclamation-circle me-2"></i>{{ errorMessage }}
          </div>
        }

        <button type="submit" class="btn btn-primary w-100 py-2 shadow-sm" [disabled]="loading">
          @if (loading) {
            <span class="spinner-border spinner-border-sm me-2"></span>
          }
          Créer mon compte
        </button>

        <p class="text-center text-muted small mt-3 mb-0">
          Déjà un compte ?
          <a routerLink="/login" class="text-primary fw-bold text-decoration-none">Se connecter</a>
        </p>
      </form>
    </div>
  </div>
</div>
